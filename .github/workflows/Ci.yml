name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: récupérer le code
        uses: actions/checkout@v3

      - name: installer node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: installer dependances
        run: npm install || echo "pas de dependances"

      - name: verifier syntaxe
        run: node index.js

      - name: build docker
        run: docker build -t ma-laverie 
